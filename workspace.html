<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SynapseIQ — Executive Decision Workspace</title>
  
  <!-- Fonts: Inter (Sans) and Lora (Editorial Serif) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  
  <!-- Core Design Stylesheet -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Immersive AI Briefing Loading Overlay -->
  <div id="briefing-overlay" class="briefing-overlay">
    <div class="overlay-inner">
      <div class="overlay-logo-container">
        <img src="assets/logo.svg" alt="SynapseIQ Logo" class="overlay-logo">
      </div>
      <div class="overlay-status-container">
        <h2 id="overlay-status-msg" class="overlay-status-msg">Reading uploaded dataset...</h2>
      </div>
      <div class="overlay-progress-track">
        <div id="overlay-progress-bar" class="overlay-progress-bar"></div>
      </div>
    </div>
  </div>

  <div class="app-container" id="app-container" style="opacity: 0;">
    
    <!-- Sidebar Navigation (Sand Desk Accent) -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <img src="assets/logo.svg" alt="SynapseIQ Logo" class="brand-logo">
        <div class="brand-info">
          <span class="brand-name">SynapseIQ</span>
          <span class="brand-tag">Executive Desk</span>
        </div>
      </div>
      
      <nav class="sidebar-nav">
        <div class="nav-section">
          <span class="nav-section-title">Workspace</span>
          <button class="nav-item active" data-view="executive-brief" id="nav-executive-brief">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Executive Brief
          </button>
          <button class="nav-item" data-view="synthesis" id="nav-synthesis">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M4 6h16M4 12h16M4 18h7" stroke-linecap="round"/>
            </svg>
            Intel Synthesis
            <span class="nav-badge">3</span>
          </button>
          <button class="nav-item" data-view="projections" id="nav-projections">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M16 8v8m-4-5v5M8 13v3M4 19h16" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Visual Projections
          </button>
          <button class="nav-item" data-view="copilot" id="nav-copilot">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Decision Copilot
          </button>
          <button class="nav-item" data-view="briefing" data-brief-id="supply-chain" id="nav-briefing">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Decision Briefing
          </button>
          <button class="nav-item" data-view="modeler" id="nav-modeler">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M3 3v18h18M18.7 8l-5.1 5.2-2.8-2.7L7 14.3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Scenario Modeler
          </button>
        </div>

        <div class="nav-section">
          <span class="nav-section-title">Archived Briefs</span>
          <button class="nav-item-sub" data-view="briefing" data-brief-id="semiconductor">
            <span class="dot-indicator"></span>
            Semiconductor Sourcing Fork
          </button>
          <button class="nav-item-sub" data-view="briefing" data-brief-id="market-expansion">
            <span class="dot-indicator"></span>
            EU Market Regulatory Shift
          </button>
        </div>
      </nav>
      
      <div class="sidebar-footer">
        <div class="user-profile">
          <div class="avatar-placeholder">AM</div>
          <div class="user-details">
            <span class="user-name">Andrew Mercer</span>
            <span class="user-role">Managing Director</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Workspace (Warm Ivory Canvas) -->
    <main class="workspace-area">
      <!-- The Sheet Canvas (Alabaster White paper sheet) -->
      <article class="desk-sheet" id="active-sheet">
        <!-- Content will be dynamically inserted here via app.js -->
        <div class="sheet-loading">Loading decision workspace...</div>
      </article>

      <!-- Side Margin Rail (Contextual AI summaries and annotations) -->
      <aside class="margin-rail" id="annotation-rail">
        <div class="rail-header">
          <span class="rail-title">SYNAPSE ANNOTATIONS</span>
          <span class="rail-status"><span class="pulse-dot"></span> Live Synthesis</span>
        </div>
        <div class="rail-content" id="rail-cards-container">
          <!-- Dynamic cards appear aligned with text paragraphs -->
        </div>
      </aside>
    </main>

  </div>

  <!-- Core Javascript Application Logic -->
  <script src="app.js"></script>
</body>
</html>
